name: Build

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows Tauri build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable-msvc

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        with:
          args: --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: mutsumi-launcher-exe
          path: src-tauri/target/debug/mutsumi-launcher.exe
          if-no-files-found: error

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mutsumi-launcher-msi
          path: src-tauri/target/debug/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mutsumi-launcher-nsis
          path: src-tauri/target/debug/bundle/nsis/*.exe
          if-no-files-found: warn
